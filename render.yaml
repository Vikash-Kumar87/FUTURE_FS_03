services:
  - type: web
    name: future-fit-backend
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 4000
      - key: CLIENT_ORIGIN
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: DATA_FILE_PATH
        value: /var/data/db.json
    disk:
      name: future-fit-data
      mountPath: /var/data
      sizeGB: 1
